<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Evaluation Dashboard</title>
    <link rel="stylesheet" href="lab.css">
</head>
<body>
    <div class="metrics-bar">
        <div class="metric">
            <div class="metric-label">Accuracy</div>
            <div class="metric-value">--</div>
            <div class="metric-bar-bg">
                <div class="metric-bar-fill" data-score="71.4"></div>
            </div>
        </div>
        <div class="metric">
            <div class="metric-label">Complexity</div>
            <div class="metric-value">--</div>
            <div class="metric-bar-bg">
                <div class="metric-bar-fill" data-score="65.2"></div>
            </div>
        </div>
        <div class="metric">
            <div class="metric-label">Reliability</div>
            <div class="metric-value">--</div>
            <div class="metric-bar-bg">
                <div class="metric-bar-fill" data-score="82.7"></div>
            </div>
        </div>
    </div>
    <div class="editor-container">
        <div class="contain_iframe">
            <iframe
                class="google-doc-iframe"
                src="https://docs.google.com/document/d/12LqgEq-bXSCTtMfLzsy8bqBD-8XbDOPrG1by8VeRsUo/edit"
                width="100%"
                height="90vh"
                style="border: none; border-radius: 6px; background: #fafafa;">
            </iframe>
        </div>
    </div>
    <!-- Firebase SDKs and app.js -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        function updateProgressBars() {
            document.querySelectorAll('.metric-bar-fill').forEach(bar => {
                const score = parseFloat(bar.dataset.score);
                bar.style.width = `${score}%`;
                bar.style.backgroundColor = 'black';
            });
        }

        // Initialize progress bars
        updateProgressBars();
    </script>
    <script src="app.js"></script>
</body>
</html>
